<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>Express Suncity Pro</title>
    <style>
        :root { --primary: #1d3557; --success: #25D366; --bg: #f1faee; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        .card { background: var(--card); padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, select, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        .row { display: flex; gap: 10px; }
        button.btn-primary { background-color: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        button.btn-secondary { background-color: #457b9d; color: white; border: none; font-weight: bold; cursor: pointer; }
        button.btn-danger { background-color: #e63946; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-whats { background-color: var(--success); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; display: flex; justify-content: center; gap: 8px; }
        
        .encomenda-item { border-left: 5px solid var(--primary); padding: 15px; background: #fafafa; margin-bottom: 10px; border-radius: 4px; font-size: 14px; }
        #loading { text-align: center; font-weight: bold; color: var(--primary); display: none; padding: 10px; }
        
        #appContainer { display: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-buttons { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto;}
        .nav-buttons button { margin: 0; padding: 10px; font-size: 13px; white-space: nowrap;}
        
        .user-bar { display: flex; justify-content: space-between; align-items: center; background: #e9ecef; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; }
        .filter-area { background: #e9ecef; padding: 10px; border-radius: 6px; margin-bottom: 15px; }

        #modalAssinatura { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 400px; }
        canvas { border: 2px dashed #ccc; width: 100%; height: 150px; background: #fdfdfd; touch-action: none; margin-bottom: 10px; }
        
        .stats-box { display: flex; justify-content: space-around; margin-bottom: 15px; text-align: center; }
        .stat { background: var(--primary); color: white; padding: 10px; border-radius: 8px; flex: 1; margin: 0 5px; }
        .stat span { display: block; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>📦 Express Suncity Pro</h2>

    <div id="loginContainer" class="card">
        <h3 style="text-align:center;">Acesso Portaria</h3>
        <input type="text" id="loginUser" placeholder="Usuário">
        <input type="password" id="loginSenha" placeholder="Senha">
        <button class="btn-primary" onclick="fazerLogin()">Entrar</button>
    </div>

    <div id="appContainer">
        <div class="user-bar">
            <div>Porteiro: <span id="nomePorteiroAtivo" style="font-weight:bold;"></span></div>
            <button class="btn-danger" onclick="location.reload()" style="width:auto; padding:5px 10px;">Sair</button>
        </div>

        <div class="nav-buttons">
            <button class="btn-primary" onclick="mudarAba('tabReceber')">📥 Receber</button>
            <button class="btn-primary" onclick="mudarAba('tabPendentes')">📋 Pendentes</button>
            <button class="btn-secondary" onclick="mudarAba('tabRelatorio')">📊 Relatórios</button>
            <button class="btn-secondary" onclick="mudarAba('tabChamado')">📝 Chamado</button>
        </div>

        <p id="loading">Sincronizando...</p>

        <div id="tabReceber" class="card tab-content active">
            <h3>Entrada de Pacote</h3>
            <div class="row">
                <select id="blocoSelect" onchange="atualizarAptos()"></select>
                <select id="aptoSelect"></select>
            </div>
            <select id="descInput">
                <option value="">Tipo de pacote...</option>
                <option value="Mercado Livre">Mercado Livre</option>
                <option value="Shopee">Shopee</option>
                <option value="Envelopes">Envelopes</option>
                <option value="Detran">Detran</option>
                <option value="Outros">Outros</option>
            </select>
            <button class="btn-primary" onclick="registrarEncomenda()">Salvar Entrada</button>
        </div>

        <div id="tabPendentes" class="card tab-content">
            <h3>A Entregar (<span id="contador">0</span>)</h3>
            <div class="filter-area">
                <input type="text" id="buscaGeral" placeholder="Filtrar por nome ou apto..." onkeyup="aplicarFiltro()">
            </div>
            <div id="listaPendentes"></div>
        </div>

        <div id="tabRelatorio" class="card tab-content">
            <h3>Resumo Geral</h3>
            <div class="stats-box">
                <div class="stat">Pendentes <span id="statPend">0</span></div>
                <div class="stat" style="background:#25D366;">Entregues <span id="statEntreg">0</span></div>
            </div>
            <input type="text" id="buscaRelatorio" placeholder="Pesquisar histórico..." onkeyup="renderizarRelatorio()">
            <div id="listaRelatorio"></div>
        </div>

        <div id="tabChamado" class="card tab-content">
            <h3>Solicitar Correção</h3>
            <textarea id="chamadoJustificativa" placeholder="Descreva o erro no cadastro aqui..." rows="4"></textarea>
            <button class="btn-whats" onclick="enviarChamado()">Enviar para o Marcos</button>
        </div>
    </div>
</div>

<div id="modalAssinatura">
    <div class="modal-content">
        <h3>Confirmar Entrega</h3>
        <input type="text" id="nomeRetirante" placeholder="Quem está retirando?">
        <canvas id="signaturePad"></canvas>
        <div class="row">
            <button class="btn-secondary" onclick="limparCanvas()">Limpar</button>
            <button class="btn-danger" onclick="fecharModal()">Voltar</button>
        </div>
        <button id="btnConfirmarBaixa" class="btn-primary" style="background:#25D366;" onclick="confirmarEntregaFinal()">✅ Finalizar e Avisar</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwxEpfeV6SKQgPMkp8nl19ibzQSWV44djQe-pMM7z6722KUc6Qz2ljlpdAnVlnL4O53Ng/exec"; 
    const SEU_WHATSAPP = "5571982282769";
    let moradoresDB = [], todasEncomendas = [], porteiroLogado = "", idEmBaixa = null, encSelecionada = null;

    async function fazerLogin() {
        const login = document.getElementById("loginUser").value, senha = document.getElementById("loginSenha").value;
        if(!login || !senha) return;
        try {
            const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ acao: "login", login: login, senha: senha }) });
            const data = await res.json();
            if(data.status === "ok") { porteiroLogado = data.nome; iniciarSistema(); }
            else alert(data.erro);
        } catch(e) { alert("Erro de conexão."); }
    }

    async function iniciarSistema() {
        document.getElementById("loginContainer").style.display = "none";
        document.getElementById("appContainer").style.display = "block";
        document.getElementById("nomePorteiroAtivo").innerText = porteiroLogado;
        await carregarMoradores();
        await buscarTudo();
    }

    function mudarAba(abaId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.getElementById(abaId).classList.add('active');
    }

    async function carregarMoradores() {
        const res = await fetch(API_URL + "?acao=getMoradores");
        moradoresDB = await res.json();
        const s = document.getElementById("blocoSelect"), blocos = [...new Set(moradoresDB.map(m => m.bloco))].sort();
        s.innerHTML = '<option value="">Bloco...</option>';
        blocos.forEach(b => s.add(new Option(`Bloco ${b}`, b)));
    }

    function atualizarAptos() {
        const b = document.getElementById("blocoSelect").value, s = document.getElementById("aptoSelect");
        s.innerHTML = '<option value="">Apto...</option>';
        moradoresDB.filter(m => m.bloco === b).forEach(m => s.add(new Option(`${m.apto} - ${m.nome}`, m.apto)));
    }

    async function buscarTudo() {
        document.getElementById("loading").style.display = "block";
        const res = await fetch(API_URL);
        todasEncomendas = await res.json();
        aplicarFiltro();
        renderizarRelatorio();
        document.getElementById("loading").style.display = "none";
    }

    function aplicarFiltro() {
        const t = document.getElementById("buscaGeral").value.toLowerCase();
        const pendentes = todasEncomendas.filter(e => e.status === "Pendente" && (e.nome.toLowerCase().includes(t) || String(e.apto).includes(t)));
        const lista = document.getElementById("listaPendentes");
        lista.innerHTML = "";
        document.getElementById("contador").innerText = pendentes.length;
        pendentes.forEach(e => {
            const div = document.createElement("div"); div.className = "encomenda-item";
            div.innerHTML = `<strong>Bl ${e.bloco} - Ap ${e.apto}</strong> (${e.nome})<br>${e.descricao}<br><small>Entrada: ${e.dataEntrada}</small><br>
                <button class="btn-whats" style="margin-top:5px;" onclick="enviarWhats('${e.telefone}','${e.nome}','${e.descricao}','${e.bloco}','${e.apto}')">Avisar Chegada</button>
                <button class="btn-danger" style="margin-top:5px;" onclick="abrirModal('${e.id}')">Entregar</button>`;
            lista.appendChild(div);
        });
    }

    function renderizarRelatorio() {
        const t = document.getElementById("buscaRelatorio").value.toLowerCase();
        const filtradas = todasEncomendas.filter(e => e.nome.toLowerCase().includes(t) || String(e.apto).includes(t));
        document.getElementById("statPend").innerText = todasEncomendas.filter(e => e.status === "Pendente").length;
        document.getElementById("statEntreg").innerText = todasEncomendas.filter(e => e.status === "Entregue").length;
        const lista = document.getElementById("listaRelatorio");
        lista.innerHTML = "";
        filtradas.slice(0, 20).forEach(e => {
            const div = document.createElement("div"); div.className = "encomenda-item";
            div.style.borderLeftColor = e.status === "Entregue" ? "#25D366" : "#1d3557";
            div.innerHTML = `<strong>Bl ${e.bloco} - Ap ${e.apto}</strong> - ${e.status}<br>${e.descricao}<br><small>In: ${e.dataEntrada} | Out: ${e.dataSaida || '-'}</small>`;
            lista.appendChild(div);
        });
    }

    function enviarWhats(tel, nome, desc, bl, ap) {
        const msg = `Olá ${nome}, sua encomenda (${desc}) está na portaria (Bl ${bl} Ap ${ap}).`;
        window.location.href = `https://wa.me/${tel}?text=${encodeURIComponent(msg)}`;
    }

    async function registrarEncomenda() {
        const bl = document.getElementById("blocoSelect").value, ap = document.getElementById("aptoSelect").value, ds = document.getElementById("descInput").value;
        if(!bl || !ap || !ds) return alert("Preencha tudo!");
        const morador = moradoresDB.find(m => m.bloco === bl && String(m.apto) === String(ap));
        const dados = { acao: "nova_encomenda", id: Date.now().toString(), bloco: bl, apto: ap, nome: morador.nome, telefone: morador.telefone, descricao: ds, dataHora: new Date().toLocaleString('pt-BR'), porteiroEntrada: porteiroLogado };
        await fetch(API_URL, { method: "POST", body: JSON.stringify(dados) });
        alert("Salvo! E-mail de aviso enviado automaticamente.");
        buscarTudo();
    }

    async function confirmarEntregaFinal() {
        const q = document.getElementById("nomeRetirante").value; if(!q) return alert("Quem retirou?");
        const dt = new Date().toLocaleString('pt-BR');
        const p = { acao: "baixar", id: idEmBaixa, dataHora: dt, porteiroSaida: porteiroLogado, quemRetirou: q, assinatura: "Sim" };
        await fetch(API_URL, { method: "POST", body: JSON.stringify(p) });
        const e = todasEncomendas.find(enc => String(enc.id) === String(idEmBaixa));
        const msg = `📦 *Comprovante Suncity*\nOlá ${e.nome}, seu pacote foi retirado por ${q} em ${dt}.`;
        window.location.href = `https://wa.me/${e.telefone}?text=${encodeURIComponent(msg)}`;
    }

    // Funções de Modal e Canvas permanecem as mesmas
    const canvas = document.getElementById('signaturePad'), ctx = canvas.getContext('2d');
    let drawing = false;
    canvas.addEventListener('touchstart', (e) => { drawing = true; ctx.beginPath(); const touch = e.touches[0]; ctx.moveTo(touch.clientX - canvas.getBoundingClientRect().left, touch.clientY - canvas.getBoundingClientRect().top); e.preventDefault(); });
    canvas.addEventListener('touchmove', (e) => { if(!drawing) return; const touch = e.touches[0]; ctx.lineTo(touch.clientX - canvas.getBoundingClientRect().left, touch.clientY - canvas.getBoundingClientRect().top); ctx.stroke(); e.preventDefault(); });
    canvas.addEventListener('touchend', () => drawing = false);
    function abrirModal(id) { idEmBaixa = id; document.getElementById("modalAssinatura").style.display = "flex"; canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
    function fecharModal() { document.getElementById("modalAssinatura").style.display = "none"; }
    function limparCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); }
    function enviarChamado() { window.location.href = `https://wa.me/${SEU_WHATSAPP}?text=${encodeURIComponent('⚠️ CHAMADO\n' + document.getElementById("chamadoJustificativa").value + '\n\nPorteiro: ' + porteiroLogado)}`; }
</script>
</body>
</html>
