<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Encomenda Express Suncity</title>
    <style>
        :root { --primary: #1d3557; --success: #25D366; --bg: #f1faee; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        .card { background: var(--card); padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, select, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        .row { display: flex; gap: 10px; }
        button.btn-primary { background-color: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        button.btn-secondary { background-color: #457b9d; color: white; border: none; font-weight: bold; cursor: pointer; }
        button.btn-danger { background-color: #e63946; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-whats { background-color: var(--success); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; display: flex; justify-content: center; gap: 8px; }
        
        .encomenda-item { border-left: 5px solid var(--primary); padding: 15px; background: #fafafa; margin-bottom: 10px; border-radius: 4px; }
        #loading { text-align: center; font-weight: bold; color: var(--primary); display: none; padding: 10px; }
        
        /* Abas e Login */
        #appContainer { display: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-buttons { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto;}
        .nav-buttons button { margin: 0; padding: 10px; font-size: 14px; white-space: nowrap;}
        
        /* Top Bar Logged In */
        .user-bar { display: flex; justify-content: space-between; align-items: center; background: #e9ecef; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; }
        .user-bar span { font-weight: bold; color: var(--primary); }
        .user-bar button { margin: 0; padding: 5px 10px; width: auto; font-size: 12px; }

        /* Filtro Area */
        .filter-area { background: #e9ecef; padding: 10px; border-radius: 6px; margin-bottom: 15px; }

        /* Modal Assinatura */
        #modalAssinatura { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 400px; }
        canvas { border: 2px dashed #ccc; width: 100%; height: 200px; background: #fdfdfd; border-radius: 5px; touch-action: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📦 Express Suncity</h2>

    <!-- TELA DE LOGIN -->
    <div id="loginContainer" class="card">
        <h3 style="text-align:center;">Identificação do Porteiro</h3>
        <input type="text" id="loginUser" placeholder="Usuário">
        <input type="password" id="loginSenha" placeholder="Senha">
        <button class="btn-primary" onclick="fazerLogin()">Entrar no Sistema</button>
        <p id="msgLogin" style="color:red; text-align:center; display:none;"></p>
    </div>

    <!-- SISTEMA PRINCIPAL -->
    <div id="appContainer">
        <div class="user-bar">
            <div>Porteiro: <span id="nomePorteiroAtivo"></span></div>
            <button class="btn-danger" onclick="fazerLogout()">Sair</button>
        </div>

        <div class="nav-buttons">
            <button class="btn-primary" onclick="mudarAba('tabReceber')">📥 Receber</button>
            <button class="btn-primary" onclick="mudarAba('tabPendentes')">📋 Pendentes</button>
            <button class="btn-secondary" onclick="mudarAba('tabChamado')">📝 Chamados</button>
        </div>

        <p id="loading">Processando... ⏳</p>

        <!-- ABA 1: Registrar Chegada -->
        <div id="tabReceber" class="card tab-content active">
            <h3>Nova Encomenda</h3>
            <div class="row">
                <select id="blocoSelect" onchange="atualizarAptos()"><option value="">Bloco...</option></select>
                <select id="aptoSelect"><option value="">Apto...</option></select>
            </div>
            <input type="text" id="descInput" placeholder="Descrição (Ex: Caixa Amazon)">
            <button class="btn-primary" onclick="registrarEncomenda()">Salvar Entrada</button>
        </div>

        <!-- ABA 2: Pendentes e Filtros -->
        <div id="tabPendentes" class="card tab-content">
            <h3>A Entregar (<span id="contador">0</span>)</h3>
            
            <div class="filter-area">
                <p style="margin: 0 0 5px 0; font-size: 14px; font-weight: bold;">🔎 Localizar Encomenda</p>
                <div class="row">
                    <input type="number" id="filtroBloco" placeholder="Bloco">
                    <input type="text" id="filtroApto" placeholder="Apto">
                </div>
                <div class="row">
                    <button class="btn-secondary" onclick="aplicarFiltro()">Buscar</button>
                    <button class="btn-danger" onclick="limparFiltro()">Limpar</button>
                </div>
            </div>

            <div id="listaPendentes"></div>
        </div>

        <!-- ABA 3: Chamados -->
        <div id="tabChamado" class="card tab-content">
            <h3>Atualizar Cadastro</h3>
            <div class="row">
                <input type="number" id="chamadoBloco" placeholder="Bloco">
                <input type="text" id="chamadoApto" placeholder="Apto">
            </div>
            <textarea id="chamadoJustificativa" placeholder="O que deve ser alterado e por que?" rows="3"></textarea>
            <button class="btn-whats" onclick="enviarChamado()">Enviar para Administração</button>
        </div>
    </div>
</div>

<!-- MODAL DE ASSINATURA -->
<div id="modalAssinatura">
    <div class="modal-content">
        <h3 style="margin-top:0;">Confirmar Retirada</h3>
        <input type="text" id="nomeRetirante" placeholder="Nome de quem está retirando">
        
        <p style="margin-bottom:5px; font-size:14px; font-weight:bold;">Assinatura na Tela:</p>
        <canvas id="signaturePad"></canvas>
        
        <div class="row">
            <button class="btn-secondary" onclick="limparCanvas()">Limpar Assinatura</button>
            <button class="btn-danger" onclick="fecharModal()">Cancelar</button>
        </div>
        <button class="btn-primary" style="background:#25D366;" onclick="confirmarEntregaFinal()">✅ Confirmar Entrega</button>
    </div>
</div>

<script>
    // ==========================================
    // COLE SUA URL AQUI DENTRO DAS ASPAS
    // ==========================================
    const API_URL = "https://script.google.com/macros/s/AKfycby2Ztzn4T6QrNYNiNHBmnHWvMuFLBfmRj4EPds6L3ieOnBIhlguqORKhCh1NVSgBYzC9A/exec"; 
    const SEU_WHATSAPP = "5571982282769";

    let moradoresDB = []; 
    let pendentesDB = []; // Guarda todas as pendências para o filtro
    let porteiroLogado = ""; 
    let idEmBaixa = null; // Guarda o ID da encomenda que está sendo entregue no momento

    // INICIALIZAÇÃO
    window.onload = () => {
        let salvo = localStorage.getItem("suncityUser");
        if(salvo) {
            porteiroLogado = salvo;
            iniciarSistema();
        } else {
            document.getElementById("loginContainer").style.display = "block";
        }
    };

    // 1. SISTEMA DE LOGIN E SESSÃO
    async function fazerLogin() {
        const login = document.getElementById("loginUser").value;
        const senha = document.getElementById("loginSenha").value;
        if(!login || !senha) return;

        document.getElementById("msgLogin").style.display = "none";
        document.getElementById("loginContainer").style.opacity = "0.5";

        try {
            const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ acao: "login", login: login, senha: senha }) });
            const data = await res.json();
            
            if(data.status === "ok") {
                porteiroLogado = data.nome;
                localStorage.setItem("suncityUser", porteiroLogado);
                iniciarSistema();
            } else {
                document.getElementById("msgLogin").innerText = data.erro;
                document.getElementById("msgLogin").style.display = "block";
            }
        } catch(e) {
            alert("Erro na rede.");
        } finally {
            document.getElementById("loginContainer").style.opacity = "1";
        }
    }

    function fazerLogout() {
        localStorage.removeItem("suncityUser");
        location.reload();
    }

    async function iniciarSistema() {
        document.getElementById("loginContainer").style.display = "none";
        document.getElementById("appContainer").style.display = "block";
        document.getElementById("nomePorteiroAtivo").innerText = porteiroLogado;
        
        await carregarMoradores();
        await buscarPendentes();
    }

    function mudarAba(abaId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.getElementById(abaId).classList.add('active');
    }

    // 2. FUNÇÕES DE BANCO DE DADOS (GET)
    async function carregarMoradores() {
        try {
            const response = await fetch(API_URL + "?acao=getMoradores");
            moradoresDB = await response.json();
            const blocos = [...new Set(moradoresDB.map(m => m.bloco))].sort();
            const s = document.getElementById("blocoSelect");
            blocos.forEach(b => s.add(new Option(`Bloco ${b}`, b)));
        } catch (e) { console.error(e); }
    }

    function atualizarAptos() {
        const b = document.getElementById("blocoSelect").value;
        const s = document.getElementById("aptoSelect");
        s.innerHTML = '<option value="">Apto...</option>';
        moradoresDB.filter(m => m.bloco === b).forEach(m => s.add(new Option(`${m.apto} - ${m.nome}`, m.apto)));
    }

    async function buscarPendentes() {
        document.getElementById("loading").style.display = "block";
        try {
            const response = await fetch(API_URL);
            pendentesDB = await response.json();
            renderizarLista(pendentesDB); // Desenha a lista original
        } catch (e) { console.error(e); } 
        finally { document.getElementById("loading").style.display = "none"; }
    }

    // 3. REGISTRAR NOVA ENCOMENDA (COM IDENTIFICAÇÃO)
    async function registrarEncomenda() {
        const bloco = document.getElementById("blocoSelect").value;
        const apto = document.getElementById("aptoSelect").value;
        const desc = document.getElementById("descInput").value;
        if (!bloco || !apto || !desc) { alert("Preencha tudo!"); return; }

        const morador = moradoresDB.find(m => m.bloco === bloco && String(m.apto) === String(apto));
        
        const dados = {
            acao: "nova_encomenda", id: Date.now().toString(),
            bloco: bloco, apto: apto, nome: morador.nome, telefone: morador.telefone,
            descricao: desc, dataHora: new Date().toLocaleString('pt-BR'), porteiroEntrada: porteiroLogado
        };

        document.getElementById("loading").style.display = "block";
        try {
            await fetch(API_URL, { method: "POST", body: JSON.stringify(dados) });
            document.getElementById("descInput").value = "";
            alert("Entrada Registrada!");
            await buscarPendentes(); 
        } catch (e) { alert("Erro ao salvar."); }
        finally { document.getElementById("loading").style.display = "none"; }
    }

    // 4. FILTRAR PENDÊNCIAS
    function aplicarFiltro() {
        const fBloco = document.getElementById("filtroBloco").value.padStart(2, '0');
        const fApto = document.getElementById("filtroApto").value;
        
        let filtrados = pendentesDB;
        if(fBloco && fBloco !== "00") filtrados = filtrados.filter(e => e.bloco === fBloco);
        if(fApto) filtrados = filtrados.filter(e => String(e.apto) === String(fApto));
        
        renderizarLista(filtrados);
    }

    function limparFiltro() {
        document.getElementById("filtroBloco").value = "";
        document.getElementById("filtroApto").value = "";
        renderizarLista(pendentesDB); // Mostra tudo de novo
    }

    // 5. SISTEMA DE ASSINATURA E BAIXA
    const canvas = document.getElementById('signaturePad');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    // Ajuste da tela para o dedo
    function getPos(e) {
        let rect = canvas.getBoundingClientRect();
        let clientX = e.clientX || (e.touches && e.touches[0].clientX);
        let clientY = e.clientY || (e.touches && e.touches[0].clientY);
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function iniciarDesenho(e) {
        isDrawing = true;
        ctx.beginPath();
        let pos = getPos(e);
        ctx.moveTo(pos.x, pos.y);
        e.preventDefault(); 
    }

    function desenhar(e) {
        if (!isDrawing) return;
        let pos = getPos(e);
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        e.preventDefault();
    }

    function pararDesenho() { isDrawing = false; }

    canvas.addEventListener('mousedown', iniciarDesenho);
    canvas.addEventListener('mousemove', desenhar);
    canvas.addEventListener('mouseup', pararDesenho);
    canvas.addEventListener('touchstart', iniciarDesenho, {passive: false});
    canvas.addEventListener('touchmove', desenhar, {passive: false});
    canvas.addEventListener('touchend', pararDesenho);

    function limparCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function abrirModalBaixa(id) {
        idEmBaixa = id;
        document.getElementById("nomeRetirante").value = "";
        limparCanvas();
        // Corrige tamanho do canvas interno pro celular
        canvas.width = canvas.offsetWidth; 
        canvas.height = canvas.offsetHeight;
        document.getElementById("modalAssinatura").style.display = "flex";
    }

    function fecharModal() {
        document.getElementById("modalAssinatura").style.display = "none";
        idEmBaixa = null;
    }

    async function confirmarEntregaFinal() {
        const quemRetirou = document.getElementById("nomeRetirante").value;
        if(!quemRetirou) { alert("Digite quem está retirando!"); return; }

        // Extrai apenas a imagem da assinatura sem o cabeçalho base64
        const imagemBase64 = canvas.toDataURL("image/png").split(',')[1];
        
        fecharModal();
        document.getElementById("loading").style.display = "block";
        
        try {
            await fetch(API_URL, { 
                method: "POST", 
                body: JSON.stringify({ 
                    acao: "baixar", id: idEmBaixa.toString(), 
                    dataHora: new Date().toLocaleString('pt-BR'),
                    porteiroSaida: porteiroLogado,
                    quemRetirou: quemRetirou,
                    assinatura: imagemBase64
                }) 
            });
            alert("Baixa confirmada com sucesso!");
            await buscarPendentes(); 
        } catch (error) {
            alert("Erro na conexão.");
        } finally {
            document.getElementById("loading").style.display = "none";
        }
    }

    function renderizarLista(encomendas) {
        const lista = document.getElementById("listaPendentes");
        lista.innerHTML = "";
        document.getElementById("contador").innerText = encomendas.length;

        encomendas.forEach(enc => {
            const div = document.createElement("div");
            div.className = "encomenda-item";
            div.innerHTML = `
                <strong>Bl ${enc.bloco} - Ap ${enc.apto}</strong> (${enc.nome})<br>
                <strong>Pacote:</strong> ${enc.descricao} <br>
                <small style="color:#666;">Registrado por: ${enc.porteiroEntrada || 'Sistema'}</small><br>
                
                <button class="btn-danger" style="margin-top:10px;" onclick="abrirModalBaixa('${enc.id}')">
                    ✅ Entregar / Assinar
                </button>
            `;
            lista.appendChild(div);
        });
    }

    function enviarChamado() {
        const bloco = document.getElementById("chamadoBloco").value;
        const apto = document.getElementById("chamadoApto").value;
        const just = document.getElementById("chamadoJustificativa").value;
        if (!bloco || !apto || !just) { alert("Preencha tudo!"); return; }
        const url = `https://wa.me/${SEU_WHATSAPP}?text=${encodeURIComponent(`⚠️ CHAMADO\nBloco ${bloco} Apto ${apto}\n"${just}"\n\nPorteiro: ${porteiroLogado}`)}`;
        window.open(url, '_blank');
    }
</script>
</body>
</html>
