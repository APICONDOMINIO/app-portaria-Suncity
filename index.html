<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Express Suncity Pro</title>
    <style>
        :root { --primary: #1d3557; --success: #25D366; --bg: #f1faee; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        .card { background: var(--card); padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, select, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        .row { display: flex; gap: 10px; }
        button.btn-primary { background-color: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        button.btn-secondary { background-color: #457b9d; color: white; border: none; font-weight: bold; cursor: pointer; }
        button.btn-danger { background-color: #e63946; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-whats { background-color: var(--success); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; display: flex; justify-content: center; gap: 8px; }
        
        .encomenda-item { border-left: 5px solid var(--primary); padding: 15px; background: #fafafa; margin-bottom: 10px; border-radius: 4px; }
        #loading { text-align: center; font-weight: bold; color: var(--primary); display: none; padding: 10px; }
        
        #appContainer { display: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .nav-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .nav-buttons button { margin: 0; padding: 12px; font-size: 14px; }
        
        .user-bar { display: flex; justify-content: space-between; align-items: center; background: #e9ecef; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; }
        .user-bar span { font-weight: bold; color: var(--primary); }

        .stats-box { display: flex; justify-content: space-around; margin-bottom: 15px; text-align: center; }
        .stat { background: var(--primary); color: white; padding: 10px; border-radius: 8px; flex: 1; margin: 0 5px; }
        .stat span { display: block; font-size: 20px; font-weight: bold; }
        .relatorio-item { border-left: 5px solid #ccc; padding: 12px; background: #fafafa; margin-bottom: 8px; border-radius: 4px; font-size: 13px;}

        #modalAssinatura { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 400px; }
        canvas { border: 2px dashed #ccc; width: 100%; height: 200px; background: #fdfdfd; border-radius: 5px; touch-action: none; margin-bottom: 10px; }

        #areaImpressao { display: none; }
        @media print {
            body { background: white; margin: 0; padding: 0; }
            .container, #modalAssinatura { display: none !important; }
            #areaImpressao { display: block !important; width: 100%; }
            @page { size: landscape; margin: 10mm; }
            .tabela-pdf { width: 100%; border-collapse: collapse; font-family: Arial, sans-serif; font-size: 11px; margin-top: 15px;}
            .tabela-pdf th, .tabela-pdf td { border: 1px solid #444; padding: 5px; text-align: left; }
            .tabela-pdf th { background: #f2f2f2; }
            h2.print-title { text-align: center; color: #1d3557; margin-bottom: 5px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📦 Express Suncity</h2>

    <div id="loginContainer" class="card">
        <h3 style="text-align:center;">Acesso Portaria</h3>
        <input type="text" id="loginUser" placeholder="Usuário">
        <input type="password" id="loginSenha" placeholder="Senha">
        <button class="btn-primary" onclick="fazerLogin()">Entrar</button>
        <p id="msgLogin" style="color:red; text-align:center; display:none;"></p>
    </div>

    <div id="appContainer">
        <div class="user-bar">
            <div>Porteiro: <span id="nomePorteiroAtivo"></span></div>
            <button class="btn-danger" style="width:auto; padding:5px 10px;" onclick="fazerLogout()">Sair</button>
        </div>

        <div class="nav-buttons">
            <button class="btn-primary" onclick="mudarAba('tabReceber')">📥 Receber</button>
            <button class="btn-primary" onclick="mudarAba('tabPendentes')">📋 Pendentes</button>
            <button class="btn-secondary" onclick="mudarAba('tabRelatorio')">📊 Relatórios</button>
            <button class="btn-secondary" onclick="mudarAba('tabChamado')">📝 Chamados</button>
        </div>

        <p id="loading">Sincronizando... ⏳</p>

        <!-- ABA RECEBER -->
        <div id="tabReceber" class="card tab-content active">
            <h3>Nova Encomenda</h3>
            <div class="row">
                <select id="blocoSelect" onchange="atualizarAptos()"><option value="">Bloco...</option></select>
                <select id="aptoSelect"><option value="">Apto...</option></select>
            </div>
            <select id="descInput">
                <option value="">Tipo de pacote...</option>
                <option value="Mercado Livre">Mercado Livre</option>
                <option value="Shopee">Shopee</option>
                <option value="Envelopes">Envelopes</option>
                <option value="Detran">Detran</option>
                <option value="Outros">Outros</option>
            </select>
            <button class="btn-primary" onclick="registrarEncomenda()">Salvar Entrada</button>
        </div>

        <!-- ABA PENDENTES -->
        <div id="tabPendentes" class="card tab-content">
            <h3>A Entregar (<span id="contador">0</span>)</h3>
            
            <div class="filter-area" style="background: #e9ecef; padding: 10px; border-radius: 6px; margin-bottom: 15px;">
                <p style="margin: 0 0 5px 0; font-size: 14px; font-weight: bold;">🔎 Filtro Dinâmico</p>
                <input type="text" id="buscaGeral" placeholder="Digite nome, pacote ou apto..." onkeyup="aplicarFiltro()">
                <div class="row">
                    <select id="filtroBlocoBusca" onchange="aplicarFiltro()">
                        <option value="">Todos os Blocos</option>
                    </select>
                    <button class="btn-secondary" onclick="limparFiltro()">Limpar</button>
                </div>
            </div>

            <div id="listaPendentes"></div>
        </div>

        <!-- ABA RELATÓRIOS -->
        <div id="tabRelatorio" class="card tab-content">
            <h3>Visão Analítica</h3>
            <div class="stats-box">
                <div class="stat">Pendentes <span id="statPend">0</span></div>
                <div class="stat" style="background:#25D366;">Entregues <span id="statEntreg">0</span></div>
            </div>
            
            <div class="filter-area" style="background: #e9ecef; padding: 10px; border-radius: 6px; margin-bottom: 15px;">
                <p style="margin: 0 0 5px 0; font-size: 14px; font-weight: bold;">Filtros de Relatório</p>
                
                <select id="relStatus" onchange="renderizarRelatorio()">
                    <option value="">Status: Todos</option>
                    <option value="Pendente">Pendentes</option>
                    <option value="Entregue">Entregues</option>
                </select>

                <div class="row">
                    <select id="relBloco" onchange="renderizarRelatorio()"><option value="">Todos Blocos</option></select>
                    <input type="text" id="relApto" placeholder="Apto" onkeyup="renderizarRelatorio()">
                </div>
                <input type="text" id="relMorador" placeholder="Pesquisar Morador ou Pacote..." onkeyup="renderizarRelatorio()">
            </div>

            <!-- NOVA CAIXA: BUSCA NO ARQUIVO MORTO COM BLOCO E APTO -->
            <div style="background:#e2e8f0; padding:15px; border-radius:8px; margin-bottom:15px; border: 1px solid #cbd5e1;">
                <p style="margin:0 0 8px 0; font-weight:bold; font-size:13px; color:#1d3557;">🔍 Pesquisar em Histórico Antigo (Arquivo Morto):</p>
                <div class="row">
                    <select id="arqBloco" onchange="atualizarAptosArq()"><option value="">Bloco...</option></select>
                    <select id="arqApto"><option value="">Apto...</option></select>
                </div>
                <div class="row">
                    <input type="text" id="arqNome" placeholder="Nome ou Pacote...">
                    <button class="btn-primary" style="width:40%;" onclick="pesquisarNoArquivo()">Buscar</button>
                </div>
            </div>
            
            <button id="btnImprimir" class="btn-secondary" onclick="imprimirRelatorio()">🖨️ Gerar PDF da Tela</button>
            <button id="btnEmailRel" class="btn-primary" style="background:#1d3557; margin-top:10px;" onclick="enviarRelatorioEmail()">✉️ Enviar para meu E-mail</button>
            
            <div id="listaRelatorio" style="margin-top:15px;"></div>
        </div>

        <div id="tabChamado" class="card tab-content">
            <h3>Atualizar Cadastro</h3>
            <div class="row">
                <input type="number" id="chamadoBloco" placeholder="Bloco">
                <input type="text" id="chamadoApto" placeholder="Apto">
            </div>
            <textarea id="chamadoJustificativa" placeholder="O que deve ser alterado e por que?" rows="3"></textarea>
            <button class="btn-whats" onclick="enviarChamado()">Enviar para Administração</button>
        </div>
    </div>
</div>

<div id="areaImpressao"></div>

<div id="modalAssinatura">
    <div class="modal-content">
        <h3 style="margin-top:0;">Confirmar Retirada</h3>
        <input type="text" id="nomeRetirante" placeholder="Nome de quem está retirando">
        <p style="margin-bottom:5px; font-size:14px; font-weight:bold;">Assinatura na Tela:</p>
        <canvas id="signaturePad"></canvas>
        <div class="row">
            <button class="btn-secondary" onclick="limparCanvas()">Limpar</button>
            <button class="btn-danger" onclick="fecharModal()">Cancelar</button>
        </div>
        <button id="btnConfirmarBaixa" class="btn-primary" style="background:#25D366; margin-top:10px;" onclick="confirmarEntregaFinal()">✅ Confirmar Entrega</button>
    </div>
</div>

<script>
    // ==========================================
    // COLE SUA NOVA URL AQUI DENTRO DAS ASPAS
    // ==========================================
    const API_URL = "https://script.google.com/macros/s/AKfycbxfdKTPepRaP2SeuK-xdlPnwRIsedgBwVMqcq5T-pob_BZsxF57zyE1xMbSWVwP4Nq_wg/exec"; 
    const SEU_WHATSAPP = "5571982282769";

    let moradoresDB = [];
    let todasAsEncomendasDB = [];
    let pendentesDB = [];
    let porteiroLogado = "";
    let idEmBaixa = null;
    let encomendaSelecionada = null; 

    let ultimaAtividade = Date.now();
    const resetarTimer = () => { ultimaAtividade = Date.now(); };
    window.addEventListener('touchstart', resetarTimer);
    window.addEventListener('click', resetarTimer);
    window.addEventListener('scroll', resetarTimer);
    window.addEventListener('keypress', resetarTimer);

    setInterval(() => {
        if(porteiroLogado && (Date.now() - ultimaAtividade > 5 * 60 * 1000)) {
            alert("A sessão expirou por inatividade de 5 minutos.");
            fazerLogout();
        }
    }, 60000); 

    window.onload = () => {
        let salvo = localStorage.getItem("suncityUser");
        if(salvo) { 
            porteiroLogado = salvo; 
            iniciarSistema(); 
        } else { 
            document.getElementById("loginContainer").style.display = "block"; 
        }
    };

    async function fazerLogin() {
        const login = document.getElementById("loginUser").value;
        const senha = document.getElementById("loginSenha").value;
        if(!login || !senha) return;
        
        document.getElementById("msgLogin").style.display = "none";
        document.getElementById("loginContainer").style.opacity = "0.5";
        
        try {
            const res = await fetch(API_URL, { 
                method: "POST", 
                body: JSON.stringify({ acao: "login", login: login, senha: senha }), 
                headers: { "Content-Type": "text/plain;charset=utf-8" } 
            });
            const data = await res.json();
            
            if(data.status === "ok") {
                porteiroLogado = data.nome;
                localStorage.setItem("suncityUser", porteiroLogado); 
                iniciarSistema();
            } else {
                document.getElementById("msgLogin").innerText = data.erro;
                document.getElementById("msgLogin").style.display = "block";
            }
        } catch(e) { 
            alert("Erro de rede ao logar. Verifique a internet e o link da API."); 
        } finally { 
            document.getElementById("loginContainer").style.opacity = "1"; 
        }
    }

    function fazerLogout() { 
        localStorage.removeItem("suncityUser"); 
        location.reload(); 
    }

    async function iniciarSistema() {
        document.getElementById("loginContainer").style.display = "none";
        document.getElementById("appContainer").style.display = "block";
        document.getElementById("nomePorteiroAtivo").innerText = porteiroLogado;
        ultimaAtividade = Date.now(); 
        
        await carregarMoradores();
        await buscarPendentes();
    }

    function mudarAba(abaId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.getElementById(abaId).classList.add('active');
    }

    async function carregarMoradores() {
        try {
            const response = await fetch(API_URL + "?acao=getMoradores");
            moradoresDB = await response.json();
            const blocos = [...new Set(moradoresDB.map(m => m.bloco))].sort();
            
            const s = document.getElementById("blocoSelect");
            const sFiltro = document.getElementById("filtroBlocoBusca");
            const relBloco = document.getElementById("relBloco");
            const arqBloco = document.getElementById("arqBloco"); // Novo para o Arquivo
            
            s.innerHTML = '<option value="">Bloco...</option>';
            sFiltro.innerHTML = '<option value="">Todos os Blocos</option>';
            relBloco.innerHTML = '<option value="">Todos Blocos</option>';
            arqBloco.innerHTML = '<option value="">Bloco...</option>'; // Novo para o Arquivo

            blocos.forEach(b => {
                s.add(new Option(`Bloco ${b}`, b));
                sFiltro.add(new Option(`Bloco ${b}`, b));
                relBloco.add(new Option(`Bloco ${b}`, b));
                arqBloco.add(new Option(`Bloco ${b}`, b)); // Novo para o Arquivo
            });
        } catch (e) { console.error(e); }
    }

    function atualizarAptos() {
        const b = document.getElementById("blocoSelect").value;
        const s = document.getElementById("aptoSelect");
        s.innerHTML = '<option value="">Apto...</option>';
        moradoresDB.filter(m => m.bloco === b).forEach(m => s.add(new Option(`${m.apto} - ${m.nome}`, m.apto)));
    }

    // NOVA FUNÇÃO: Cascata do Arquivo Morto
    function atualizarAptosArq() {
        const b = document.getElementById("arqBloco").value;
        const s = document.getElementById("arqApto");
        s.innerHTML = '<option value="">Apto...</option>';
        moradoresDB.filter(m => m.bloco === b).forEach(m => s.add(new Option(`${m.apto} - ${m.nome}`, m.apto)));
    }

    async function buscarPendentes() {
        document.getElementById("loading").style.display = "block";
        try {
            const response = await fetch(API_URL);
            todasAsEncomendasDB = await response.json();
            pendentesDB = todasAsEncomendasDB.filter(enc => enc.status === "Pendente");
            
            aplicarFiltro(); 
            renderizarRelatorio();
        } catch (e) { console.error(e); } 
        finally { document.getElementById("loading").style.display = "none"; }
    }

    function enviarWhatsApp(telefone, nome, descricao, bloco, apto) {
        const mensagem = `🚨 *CHEGOU ENCOMENDA!* 🚨\n\nOlá *${nome}*! 👋\nUma nova encomenda aguarda por você na portaria:\n\n📦 *Pacote:* ${descricao}\n🏢 *Local:* Bloco ${bloco} - Apto ${apto}\n\n🏃‍♂️ Por favor, retire assim que possível.\n🛡️ *Registrado por:* ${porteiroLogado}`;
        window.location.href = `https://wa.me/${telefone}?text=${encodeURIComponent(mensagem)}`;
    }

    async function registrarEncomenda() {
        const bloco = document.getElementById("blocoSelect").value;
        const apto = document.getElementById("aptoSelect").value;
        const desc = document.getElementById("descInput").value;
        
        if (!bloco || !apto || !desc) { alert("Preencha bloco, apto e a descrição!"); return; }

        const morador = moradoresDB.find(m => m.bloco === bloco && String(m.apto) === String(apto));
        const dados = {
            acao: "nova_encomenda", 
            id: Date.now().toString(),
            bloco: bloco, 
            apto: apto, 
            nome: morador.nome, 
            telefone: morador.telefone,
            descricao: desc, 
            dataHora: new Date().toLocaleString('pt-BR'), 
            porteiroEntrada: porteiroLogado
        };

        document.getElementById("loading").style.display = "block";
        try {
            await fetch(API_URL, { 
                method: "POST", 
                body: JSON.stringify(dados), 
                headers: { "Content-Type": "text/plain;charset=utf-8" } 
            });
            
            document.getElementById("descInput").value = "";
            await buscarPendentes(); 
            
            if(confirm("Entrada Registrada no Sistema!\n\n(E-mail de aviso disparado).\n\nDeseja enviar aviso por WhatsApp agora?")) {
                enviarWhatsApp(morador.telefone, morador.nome, desc, bloco, apto);
            }
        } catch (e) { alert("Erro ao salvar a encomenda."); }
        finally { document.getElementById("loading").style.display = "none"; }
    }

    // NOVA INTELIGÊNCIA: Buscar no Arquivo Morto usando os Dropdowns
    async function pesquisarNoArquivo() {
        const b = document.getElementById("arqBloco").value;
        const a = document.getElementById("arqApto").value;
        const t = document.getElementById("arqNome").value;
        
        if(!b && !a && !t) return alert("Preencha pelo menos um campo (Bloco, Apto ou Nome) para buscar no histórico.");
        
        document.getElementById("loading").style.display = "block";
        
        try {
            const res = await fetch(API_URL, { 
                method: "POST", 
                body: JSON.stringify({ acao: "buscar_arquivo", bloco: b, apto: a, termo: t }),
                headers: { "Content-Type": "text/plain;charset=utf-8" }
            });
            const dadosArquivo = await res.json();
            
            if(dadosArquivo.length === 0) {
                alert("Nenhum registro antigo encontrado com esses filtros.");
            } else {
                todasAsEncomendasDB = dadosArquivo; 
                renderizarRelatorio();
                alert(`Encontrado! Exibindo ${dadosArquivo.length} registros do Arquivo Morto. Para voltar aos registros atuais, recarregue a página (F5).`);
            }
        } catch(e) {
            alert("Erro ao buscar no arquivo.");
        } finally {
            document.getElementById("loading").style.display = "none";
        }
    }

    function aplicarFiltro() {
        const termoBusca = document.getElementById("buscaGeral").value.toLowerCase();
        const blocoSelecionado = document.getElementById("filtroBlocoBusca").value;
        
        let filtrados = pendentesDB.filter(enc => {
            const matchBloco = blocoSelecionado === "" || enc.bloco === blocoSelecionado;
            const matchTexto = termoBusca === "" || 
                               enc.nome.toLowerCase().includes(termoBusca) || 
                               enc.descricao.toLowerCase().includes(termoBusca) || 
                               String(enc.apto).includes(termoBusca);
            return matchBloco && matchTexto;
        });
        
        renderizarLista(filtrados);
    }

    function limparFiltro() {
        document.getElementById("buscaGeral").value = "";
        document.getElementById("filtroBlocoBusca").value = "";
        renderizarLista(pendentesDB);
    }

    function renderizarLista(encomendas) {
        const lista = document.getElementById("listaPendentes");
        lista.innerHTML = "";
        document.getElementById("contador").innerText = encomendas.length;
        
        encomendas.forEach(enc => {
            const div = document.createElement("div");
            div.className = "encomenda-item";
            div.innerHTML = `
                <strong>Bl ${enc.bloco} - Ap ${enc.apto}</strong> (${enc.nome})<br>
                <strong>Pacote:</strong> ${enc.descricao} <br>
                <small style="color:#666; font-weight:bold;">Entrada: ${enc.dataHora}</small><br>
                <small style="color:#666;">Registrado por: ${enc.porteiroEntrada || 'Sistema'}</small><br>
                <button class="btn-whats" onclick="enviarWhatsApp('${enc.telefone}', '${enc.nome}', '${enc.descricao}', '${enc.bloco}', '${enc.apto}')">Avisar no WhatsApp</button>
                <button class="btn-danger" style="margin-top:5px;" onclick="abrirModalBaixa('${enc.id}')">✅ Entregar / Assinar</button>
            `;
            lista.appendChild(div);
        });
    }

    function renderizarRelatorio() {
        const termo = document.getElementById("relMorador").value.toLowerCase();
        const fBloco = document.getElementById("relBloco").value;
        const fApto = document.getElementById("relApto").value.toLowerCase();
        const fStatus = document.getElementById("relStatus").value;

        const filtradas = todasAsEncomendasDB.filter(enc => {
            const matchBloco = fBloco === "" || enc.bloco === fBloco;
            const matchApto = fApto === "" || String(enc.apto).toLowerCase().includes(fApto);
            const matchNome = termo === "" || enc.nome.toLowerCase().includes(termo) || enc.descricao.toLowerCase().includes(termo);
            const matchStatus = fStatus === "" || enc.status === fStatus;
            
            return matchBloco && matchApto && matchNome && matchStatus;
        });

        document.getElementById("statPend").innerText = filtradas.filter(e => e.status === "Pendente").length;
        document.getElementById("statEntreg").innerText = filtradas.filter(e => e.status !== "Pendente").length; 

        const lista = document.getElementById("listaRelatorio");
        lista.innerHTML = "";

        filtradas.slice().reverse().forEach(enc => {
            const div = document.createElement("div");
            div.className = "relatorio-item " + (enc.status === "Pendente" ? "status-pendente" : "status-entregue");
            
            let infoSaida = (enc.status === "Entregue" || enc.status === "Arquivado") ? `<br><strong>Retirado por:</strong> ${enc.quemRetirou} <br><small>Saída: ${enc.dataSaida} (${enc.porteiroSaida || 'Sistema'})</small>` : ``;
            
            div.innerHTML = `
                <strong>Bl ${enc.bloco} - Ap ${enc.apto}</strong> (${enc.nome})<br>
                <strong>Status:</strong> ${enc.status}<br>
                <strong>Pacote:</strong> ${enc.descricao} <br>
                <small>Entrada: ${enc.dataHora} (${enc.porteiroEntrada || 'Sistema'})</small>
                ${infoSaida}
            `;
            lista.appendChild(div);
        });
    }

    function imprimirRelatorio() {
        const termo = document.getElementById("relMorador").value.toLowerCase();
        const fBloco = document.getElementById("relBloco").value;
        const fApto = document.getElementById("relApto").value.toLowerCase();
        const fStatus = document.getElementById("relStatus").value;

        const filtradas = todasAsEncomendasDB.filter(enc => {
            const matchBloco = fBloco === "" || enc.bloco === fBloco;
            const matchApto = fApto === "" || String(enc.apto).toLowerCase().includes(fApto);
            const matchNome = termo === "" || enc.nome.toLowerCase().includes(termo) || enc.descricao.toLowerCase().includes(termo);
            const matchStatus = fStatus === "" || enc.status === fStatus;
            
            return matchBloco && matchApto && matchNome && matchStatus;
        });

        const pendentes = filtradas.filter(e => e.status === "Pendente");
        const entregues = filtradas.filter(e => e.status !== "Pendente"); 

        let htmlPDF = `<h2 class="print-title">📊 Relatório Analítico - Express Suncity</h2>`;
        htmlPDF += `<p style="text-align:center; font-family:Arial, sans-serif; font-size:12px; margin-bottom:20px;">Filtros: Status (${fStatus||"Todos"})</p>`;

        if(pendentes.length > 0) {
            htmlPDF += `<h3 class="print-sub">🔴 PENDENTES (${pendentes.length})</h3>
            <table class="tabela-pdf">
            <tr><th>BLOCO</th><th>APTO</th><th>MORADOR</th><th>PACOTE</th><th>DATA/HORA ENTRADA</th><th>PORTEIRO IN</th></tr>`;
            pendentes.forEach(p => {
                htmlPDF += `<tr><td>${p.bloco}</td><td>${p.apto}</td><td>${p.nome}</td><td>${p.descricao}</td><td>${p.dataHora}</td><td>${p.porteiroEntrada || '-'}</td></tr>`;
            });
            htmlPDF += `</table>`;
        }

        if(entregues.length > 0) {
            htmlPDF += `<h3 class="print-sub">🟢 ENTREGUES / HISTÓRICO (${entregues.length})</h3>
            <table class="tabela-pdf">
            <tr><th>BLOCO</th><th>APTO</th><th>MORADOR</th><th>PACOTE</th><th>DATA ENTRADA</th><th>DATA SAÍDA</th><th>QUEM RETIROU</th><th>PORTEIRO OUT</th></tr>`;
            entregues.forEach(e => {
                htmlPDF += `<tr><td>${e.bloco}</td><td>${e.apto}</td><td>${e.nome}</td><td>${e.descricao}</td><td>${e.dataHora}</td><td>${e.dataSaida || '-'}</td><td>${e.quemRetirou || '-'}</td><td>${e.porteiroSaida || '-'}</td></tr>`;
            });
            htmlPDF += `</table>`;
        }

        if(pendentes.length === 0 && entregues.length === 0) {
            htmlPDF += `<p style="font-family:Arial, sans-serif;">Nenhuma encomenda encontrada para este filtro.</p>`;
        }

        document.getElementById("areaImpressao").innerHTML = htmlPDF;

        const tituloOriginal = document.title;
        const agora = new Date();
        const strData = agora.toLocaleDateString('pt-BR').replace(/\//g, '-');
        const strHora = agora.toLocaleTimeString('pt-BR').substring(0, 5).replace(':', 'h') + 'm';
        document.title = `RELATÓRIO_SUNCITY_${strData}_${strHora}`;

        window.print();

        setTimeout(() => { document.title = tituloOriginal; }, 2000);
    }

    // LÓGICA DE ASSINATURA NA TELA (CANVAS)
    const canvas = document.getElementById('signaturePad');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    function getPos(e) {
        var rect = canvas.getBoundingClientRect();
        if (e.changedTouches) {
            return { x: e.changedTouches[0].clientX - rect.left, y: e.changedTouches[0].clientY - rect.top };
        }
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    function iniciarDesenho(e) { 
        e.preventDefault(); 
        isDrawing = true; 
        let pos = getPos(e); 
        ctx.beginPath(); 
        ctx.moveTo(pos.x, pos.y); 
    }
    
    function desenhar(e) { 
        if (!isDrawing) return; 
        e.preventDefault(); 
        let pos = getPos(e); 
        ctx.lineWidth = 2; 
        ctx.lineCap = 'round'; 
        ctx.lineTo(pos.x, pos.y); 
        ctx.stroke(); 
    }
    
    function pararDesenho(e) { 
        e.preventDefault(); 
        isDrawing = false; 
        resetarTimer(); 
    }
    
    canvas.addEventListener('mousedown', iniciarDesenho);
    canvas.addEventListener('mousemove', desenhar);
    canvas.addEventListener('mouseup', pararDesenho);
    canvas.addEventListener('touchstart', iniciarDesenho, {passive: false});
    canvas.addEventListener('touchmove', desenhar, {passive: false});
    canvas.addEventListener('touchend', pararDesenho, {passive: false});

    function limparCanvas() { 
        ctx.clearRect(0, 0, canvas.width, canvas.height); 
    }

    function abrirModalBaixa(id) {
        idEmBaixa = id; 
        encomendaSelecionada = pendentesDB.find(e => String(e.id) === String(id)); 
        document.getElementById("nomeRetirante").value = ""; 
        document.getElementById("modalAssinatura").style.display = "flex";
        setTimeout(() => { 
            canvas.width = canvas.offsetWidth; 
            canvas.height = canvas.offsetHeight; 
            limparCanvas(); 
        }, 100);
    }

    function fecharModal() { 
        document.getElementById("modalAssinatura").style.display = "none"; 
        idEmBaixa = null; 
        encomendaSelecionada = null; 
    }

    async function confirmarEntregaFinal() {
        const quemRetirou = document.getElementById("nomeRetirante").value;
        if(!quemRetirou) { alert("Digite o nome de quem está retirando o pacote!"); return; }

        const btn = document.getElementById("btnConfirmarBaixa");
        btn.innerText = "Processando..."; 
        btn.disabled = true;
        
        const dataBaixa = new Date().toLocaleString('pt-BR');
        const pacoteFaturado = encomendaSelecionada;

        try {
            const payload = { 
                acao: "baixar", 
                id: idEmBaixa.toString(), 
                dataHora: dataBaixa, 
                porteiroSaida: porteiroLogado || "Não identificado", 
                quemRetirou: quemRetirou, 
                assinatura: "Sim" 
            };
            
            await fetch(API_URL, { 
                method: "POST", 
                body: JSON.stringify(payload), 
                headers: { "Content-Type": "text/plain;charset=utf-8" } 
            });
            
            fecharModal(); 
            alert("Baixa confirmada!\n\n(Recibo enviado por e-mail automaticamente).");
            
            if(pacoteFaturado) {
                const msgRecibo = `✅ *ENCOMENDA RETIRADA!* ✅\n\nOlá *${pacoteFaturado.nome}*!\nA sua encomenda (${pacoteFaturado.descricao}) foi retirada na portaria.\n\n👤 *Entregue para:* ${quemRetirou}\n🕒 *Data/Hora:* ${dataBaixa}\n🛡️ *Registrado por:* ${porteiroLogado}\n\n✔️ Assinatura coletada na tela e entrega salva no sistema.`;
                window.location.href = `https://wa.me/${pacoteFaturado.telefone}?text=${encodeURIComponent(msgRecibo)}`;
            }
            await buscarPendentes(); 
        } catch (error) { 
            alert("Erro da rede: " + error.message); 
        } finally { 
            btn.innerText = "✅ Confirmar Entrega"; 
            btn.disabled = false; 
        }
    }

    function enviarChamado() {

        window.location.href = `https://wa.me/${SEU_WHATSAPP}?text=${encodeURIComponent(texto)}`;
    }
