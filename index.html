<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Express Suncity Pro</title>
    <style>
        :root { --primary: #1d3557; --success: #25D366; --bg: #f1faee; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        .card { background: var(--card); padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, select, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        .row { display: flex; gap: 10px; }
        button.btn-primary { background-color: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        button.btn-secondary { background-color: #457b9d; color: white; border: none; font-weight: bold; cursor: pointer; }
        button.btn-danger { background-color: #e63946; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-whats { background-color: var(--success); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; display: flex; justify-content: center; gap: 8px; }
        
        .encomenda-item { border-left: 5px solid var(--primary); padding: 15px; background: #fafafa; margin-bottom: 10px; border-radius: 4px; }
        #loading { text-align: center; font-weight: bold; color: var(--primary); display: none; padding: 10px; }
        
        #appContainer { display: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .nav-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .nav-buttons button { margin: 0; padding: 12px; font-size: 14px; }
        
        .user-bar { display: flex; justify-content: space-between; align-items: center; background: #e9ecef; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; }
        .user-bar span { font-weight: bold; color: var(--primary); }

        .stats-box { display: flex; justify-content: space-around; margin-bottom: 15px; text-align: center; }
        .stat { background: var(--primary); color: white; padding: 10px; border-radius: 8px; flex: 1; margin: 0 5px; }
        .stat span { display: block; font-size: 20px; font-weight: bold; }
        .relatorio-item { border-left: 5px solid #ccc; padding: 12px; background: #fafafa; margin-bottom: 8px; border-radius: 4px; font-size: 13px;}

        #areaImpressao { display: none; }
        @media print {
            body { background: white; margin: 0; padding: 0; }
            .container, #modalAssinatura { display: none !important; }
            #areaImpressao { display: block !important; width: 100%; }
            @page { size: landscape; margin: 10mm; }
            .tabela-pdf { width: 100%; border-collapse: collapse; font-family: Arial; font-size: 10px; }
            .tabela-pdf th, .tabela-pdf td { border: 1px solid #444; padding: 5px; }
            .tabela-pdf th { background: #f2f2f2; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📦 Express Suncity</h2>

    <div id="loginContainer" class="card">
        <h3 style="text-align:center;">Acesso Portaria</h3>
        <input type="text" id="loginUser" placeholder="Usuário">
        <input type="password" id="loginSenha" placeholder="Senha">
        <button class="btn-primary" onclick="fazerLogin()">Entrar</button>
    </div>

    <div id="appContainer">
        <div class="user-bar">
            <div>Porteiro: <span id="nomePorteiroAtivo"></span></div>
            <button class="btn-danger" style="width:auto; padding:5px 10px;" onclick="fazerLogout()">Sair</button>
        </div>

        <div class="nav-buttons">
            <button class="btn-primary" onclick="mudarAba('tabReceber')">📥 Receber</button>
            <button class="btn-primary" onclick="mudarAba('tabPendentes')">📋 Pendentes</button>
            <button class="btn-secondary" onclick="mudarAba('tabRelatorio')">📊 Relatórios</button>
            <button class="btn-secondary" onclick="mudarAba('tabChamado')">📝 Chamados</button>
        </div>

        <p id="loading">Sincronizando... ⏳</p>

        <div id="tabReceber" class="card tab-content active">
            <h3>Nova Encomenda</h3>
            <div class="row"><select id="blocoSelect" onchange="atualizarAptos()"></select><select id="aptoSelect"></select></div>
            <select id="descInput">
                <option value="">Tipo de pacote...</option>
                <option value="Mercado Livre">Mercado Livre</option>
                <option value="Shopee">Shopee</option>
                <option value="Envelopes">Envelopes</option>
                <option value="Detran">Detran</option>
                <option value="Outros">Outros</option>
            </select>
            <button class="btn-primary" onclick="registrarEncomenda()">Salvar Entrada</button>
        </div>

        <div id="tabPendentes" class="card tab-content">
            <h3>A Entregar (<span id="contador">0</span>)</h3>
            <input type="text" id="buscaGeral" placeholder="Nome ou Apto..." onkeyup="aplicarFiltro()">
            <div id="listaPendentes"></div>
        </div>

        <div id="tabRelatorio" class="card tab-content">
            <h3>Filtros Atuais</h3>
            <div class="stats-box">
                <div class="stat">Pendentes <span id="statPend">0</span></div>
                <div class="stat" style="background:#25D366;">Entregues <span id="statEntreg">0</span></div>
            </div>
            <select id="relStatus" onchange="renderizarRelatorio()"><option value="">Status: Todos</option><option value="Pendente">Pendentes</option><option value="Entregue">Entregues</option></select>
            <div class="row"><select id="relBloco" onchange="renderizarRelatorio()"><option value="">Blocos</option></select><input type="text" id="relApto" placeholder="Apto" onkeyup="renderizarRelatorio()"></div>
            <input type="text" id="relMorador" placeholder="Morador ou Pacote..." onkeyup="renderizarRelatorio()">
            
            <div style="background:#eee; padding:10px; border-radius:8px; margin-top:10px;">
                <p style="margin:0 0 5px 0; font-weight:bold; font-size:12px;">🔍 Pesquisar em Histórico Antigo (Arquivo Morto):</p>
                <div class="row">
                    <input type="text" id="buscaArquivo" placeholder="Nome ou Apto antigo...">
                    <button class="btn-primary" style="width:40%;" onclick="pesquisarNoArquivo()">Buscar</button>
                </div>
            </div>

            <button class="btn-secondary" style="margin-top:15px;" onclick="imprimirRelatorio()">🖨️ PDF do que está na tela</button>
            <button class="btn-primary" style="background:#1d3557; margin-top:5px;" onclick="enviarRelatorioEmail()">✉️ Enviar p/ meu E-mail</button>
            
            <div id="listaRelatorio"></div>
        </div>

        <div id="tabChamado" class="card tab-content">
            <h3>Solicitar Alteração</h3>
            <textarea id="chamadoJustificativa" placeholder="O que deve ser alterado?" rows="3"></textarea>
            <button class="btn-whats" onclick="enviarChamado()">Enviar Chamado</button>
        </div>
    </div>
</div>

<div id="areaImpressao"></div>

<div id="modalAssinatura">
    <div class="modal-content">
        <h3>Assinatura na Tela:</h3>
        <input type="text" id="nomeRetirante" placeholder="Nome de quem retira">
        <canvas id="signaturePad" style="border:1px dashed #aaa; width:100%; height:200px; touch-action:none;"></canvas>
        <div class="row"><button class="btn-secondary" onclick="limparCanvas()">Limpar</button><button class="btn-danger" onclick="fecharModal()">Voltar</button></div>
        <button id="btnConfirmarBaixa" class="btn-primary" style="background:#25D366;" onclick="confirmarEntregaFinal()">✅ Confirmar Entrega</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwDKWEtsWqNFkA1f-0nqPwUQl6BzPBmmRxF-jGdVaKFvXLoqgblXFHjhSICGO_iEPtg3g/exec"; 
    const SEU_WHATSAPP = "5571982282769";

    let moradoresDB = [], todasAsEncomendasDB = [], pendentesDB = [], porteiroLogado = "", idEmBaixa = null, encSelecionada = null; 
    let ultimaAtividade = Date.now();

    window.onload = () => {
        let salvo = localStorage.getItem("suncityUser");
        if(salvo) { porteiroLogado = salvo; iniciarSistema(); }
        else { document.getElementById("loginContainer").style.display = "block"; }
    };

    const resetarTimer = () => ultimaAtividade = Date.now();
    window.addEventListener('touchstart', resetarTimer); window.addEventListener('click', resetarTimer);
    setInterval(() => { if(porteiroLogado && (Date.now() - ultimaAtividade > 5 * 60 * 1000)) { alert("Sessão expirada."); fazerLogout(); } }, 60000);

    async function fazerLogin() {
        const u = document.getElementById("loginUser").value, s = document.getElementById("loginSenha").value;
        if(!u || !s) return;
        const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ acao: "login", login: u, senha: s }) });
        const data = await res.json();
        if(data.status === "ok") { porteiroLogado = data.nome; localStorage.setItem("suncityUser", porteiroLogado); iniciarSistema(); }
        else alert(data.erro);
    }

    function fazerLogout() { localStorage.removeItem("suncityUser"); location.reload(); }

    async function iniciarSistema() {
        document.getElementById("loginContainer").style.display = "none";
        document.getElementById("appContainer").style.display = "block";
        document.getElementById("nomePorteiroAtivo").innerText = porteiroLogado;
        const resM = await fetch(API_URL + "?acao=getMoradores"); moradoresDB = await resM.json();
        const bS = document.getElementById("blocoSelect"), bF = document.getElementById("relBloco"), blocos = [...new Set(moradoresDB.map(m => m.bloco))].sort();
        bS.innerHTML = '<option value="">Bloco...</option>'; bF.innerHTML = '<option value="">Blocos</option>';
        blocos.forEach(b => { bS.add(new Option(`Bloco ${b}`, b)); bF.add(new Option(`Bl ${b}`, b)); });
        await buscarPendentes();
    }

    function mudarAba(id) { document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function atualizarAptos() { const b = document.getElementById("blocoSelect").value, s = document.getElementById("aptoSelect"); s.innerHTML = '<option value="">Apto...</option>'; moradoresDB.filter(m => m.bloco === b).forEach(m => s.add(new Option(`${m.apto} - ${m.nome}`, m.apto))); }

    async function buscarPendentes() {
        document.getElementById("loading").style.display = "block";
        const res = await fetch(API_URL); todasAsEncomendasDB = await res.json();
        pendentesDB = todasAsEncomendasDB.filter(e => e.status === "Pendente");
        aplicarFiltro(); renderizarRelatorio();
        document.getElementById("loading").style.display = "none";
    }

    async function registrarEncomenda() {
        const bl = document.getElementById("blocoSelect").value, ap = document.getElementById("aptoSelect").value, ds = document.getElementById("descInput").value;
        if (!bl || !ap || !ds) return alert("Preencha tudo!");
        const m = moradoresDB.find(mo => mo.bloco === bl && String(mo.apto) === String(ap));
        const d = { acao: "nova_encomenda", id: Date.now().toString(), bloco: bl, apto: ap, nome: m.nome, telefone: m.telefone, descricao: ds, dataHora: new Date().toLocaleString('pt-BR'), porteiroEntrada: porteiroLogado };
        await fetch(API_URL, { method: "POST", body: JSON.stringify(d) });
        if(confirm("Salvo! Enviar WhatsApp?")) window.location.href = `https://wa.me/${m.telefone}?text=${encodeURIComponent('🚨 *CHEGOU ENCOMENDA!* 🚨\n\nOlá *'+m.nome+'*! 👋\nSua encomenda ('+ds+') está na portaria.\n🛡️ *Porteiro:* '+porteiroLogado)}`;
        buscarPendentes();
    }

    async function pesquisarNoArquivo() {
        const termo = document.getElementById("buscaArquivo").value;
        if(!termo) return alert("Digite algo para buscar no arquivo morto.");
        document.getElementById("loading").style.display = "block";
        const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ acao: "buscar_arquivo", termo: termo }) });
        const dadosArquivo = await res.json();
        if(dadosArquivo.length === 0) alert("Nenhum registro antigo encontrado.");
        else {
            todasAsEncomendasDB = dadosArquivo; // Temporariamente substitui para exibir na tela
            renderizarRelatorio();
            alert("Exibindo "+dadosArquivo.length+" registros do Arquivo Morto. Para voltar ao atual, atualize a página.");
        }
        document.getElementById("loading").style.display = "none";
    }

    function aplicarFiltro() {
        const t = document.getElementById("buscaGeral").value.toLowerCase();
        const f = pendentesDB.filter(e => e.nome.toLowerCase().includes(t) || String(e.apto).includes(t));
        const l = document.getElementById("listaPendentes"); l.innerHTML = ""; document.getElementById("contador").innerText = f.length;
        f.forEach(e => {
            const div = document.createElement("div"); div.className = "encomenda-item";
            div.innerHTML = `<strong>Bl ${e.bloco} - Ap ${e.apto}</strong> (${e.nome})<br>${e.descricao}<br><button class="btn-danger" style="margin-top:5px;" onclick="abrirModal('${e.id}')">✅ Entregar</button>`;
            l.appendChild(div);
        });
    }

    function renderizarRelatorio() {
        const t = document.getElementById("relMorador").value.toLowerCase(), b = document.getElementById("relBloco").value, a = document.getElementById("relApto").value, s = document.getElementById("relStatus").value;
        const f = todasAsEncomendasDB.filter(e => (b===""||e.bloco===b) && (a===""||String(e.apto).includes(a)) && (s===""||e.status===s) && (t===""||e.nome.toLowerCase().includes(t)||e.descricao.toLowerCase().includes(t)));
        document.getElementById("statPend").innerText = f.filter(e => e.status === "Pendente").length;
        document.getElementById("statEntreg").innerText = f.filter(e => e.status !== "Pendente").length;
        const l = document.getElementById("listaRelatorio"); l.innerHTML = "";
        f.slice().reverse().forEach(e => {
            const div = document.createElement("div"); div.className = "relatorio-item";
            div.style.borderLeft = (e.status === "Entregue" || e.status === "Arquivado") ? "5px solid var(--success)" : "5px solid var(--primary)";
            div.innerHTML = `<strong>Bl ${e.bloco} - Ap ${e.apto}</strong> (${e.nome}) - ${e.status}<br><small>${e.descricao} | In: ${e.dataHora}</small>`;
            l.appendChild(div);
        });
    }

    function imprimirRelatorio() {
        const t = document.getElementById("relMorador").value.toLowerCase(), b = document.getElementById("relBloco").value, a = document.getElementById("relApto").value, s = document.getElementById("relStatus").value;
        const f = todasAsEncomendasDB.filter(e => (b===""||e.bloco===b) && (a===""||String(e.apto).includes(a)) && (s===""||e.status===s) && (t===""||e.nome.toLowerCase().includes(t)||e.descricao.toLowerCase().includes(t)));
        let h = `<h2 class='print-title'>📊 Relatório Analítico - Suncity</h2><table class='tabela-pdf'><tr><th>BL</th><th>AP</th><th>MORADOR</th><th>PACOTE</th><th>STATUS</th><th>ENTRADA</th><th>RETIROU</th></tr>`;
        f.forEach(e => h += `<tr><td>${e.bloco}</td><td>${e.apto}</td><td>${e.nome}</td><td>${e.descricao}</td><td>${e.status}</td><td>${e.dataHora}</td><td>${e.quemRetirou||'-'}</td></tr>`);
        h += `</table>`;
        document.getElementById("areaImpressao").innerHTML = h;
        const tOrig = document.title; document.title = "RELATORIO_SUNCITY_" + new Date().toLocaleString();
        window.print(); document.title = tOrig;
    }

    async function enviarRelatorioEmail() {
        const p = { acao: "enviar_relatorio_pdf", fBloco: document.getElementById("relBloco").value, fApto: document.getElementById("relApto").value, fStatus: document.getElementById("relStatus").value, termo: document.getElementById("relMorador").value };
        await fetch(API_URL, { method: "POST", body: JSON.stringify(p) });
        alert("Enviado para seu e-mail!");
    }

    // CANVAS E MODAL
    const canvas = document.getElementById('signaturePad'), ctx = canvas.getContext('2d');
    let drawing = false;
    function getP(e) { const r = canvas.getBoundingClientRect(); return { x: (e.touches ? e.touches[0].clientX : e.clientX) - r.left, y: (e.touches ? e.touches[0].clientY : e.clientY) - r.top }; }
    canvas.addEventListener('mousedown', (e) => { drawing = true; const p = getP(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
    canvas.addEventListener('mousemove', (e) => { if(!drawing) return; const p = getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
    canvas.addEventListener('mouseup', () => drawing = false);
    canvas.addEventListener('touchstart', (e) => { drawing = true; const p = getP(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); e.preventDefault(); });
    canvas.addEventListener('touchmove', (e) => { if(!drawing) return; const p = getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); });
    function limparCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); }
    function abrirModal(id) { idEmBaixa = id; encSelecionada = pendentesDB.find(e => String(e.id) === String(id)); document.getElementById("modalAssinatura").style.display = "flex"; setTimeout(() => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }, 100); }
    function fecharModal() { document.getElementById("modalAssinatura").style.display = "none"; }
    async function confirmarEntregaFinal() {
        const q = document.getElementById("nomeRetirante").value; if(!q) return alert("Nome?");
        const dt = new Date().toLocaleString('pt-BR');
        await fetch(API_URL, { method: "POST", body: JSON.stringify({ acao: "baixar", id: idEmBaixa, dataHora: dt, porteiroSaida: porteiroLogado, quemRetirou: q }) });
        window.location.href = `https://wa.me/${encSelecionada.telefone}?text=${encodeURIComponent('✅ *RETIRADO!* ✅\nOlá *'+encSelecionada.nome+'*! Seu pacote foi retirado por '+q+' em '+dt)}`;
        fecharModal(); buscarPendentes();
    }
    function enviarChamado() { window.location.href = `https://wa.me/${SEU_WHATSAPP}?text=${encodeURIComponent('⚠️ CHAMADO: ' + document.getElementById("chamadoJustificativa").value)}`; }
</script>
</body>
</html>
